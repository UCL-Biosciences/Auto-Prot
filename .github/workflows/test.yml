# .github/workflows/test.yml
name: Tests
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: pytest