# ========================
# AUTO-PROTEOMICS CONFIG
# ========================
# This file controls how the pipeline runs. Update paths and parameters as needed.

# ---- DATA SETTINGS ----
data_type: prot                 # Type of data: "prot" for proteomics (default), "phospho" for phosphoproteomics

phospho_row_id: ""             # For phosphoproteomics: specify how to create unique IDs when genes repeat.
# Example format:
# phospho_row_id:
#   fields:                    # Columns used to create unique row IDs (e.g. PTM info)
#     - "Amino acid"
#     - "Position"
#     - "Multiplicity"
#   missing_value: "NA"        # Value to use if any field is missing

missing_threshold: 0.75        # Proportion threshold for missingness per group (0–1).
                                # e.g. 0.75 means proteins must appear in ≥75% of samples per group.

# ---- NORMALISATION & IMPUTATION ----
normalise_method: vsn          # Normalisation: "vsn" (variance stabilisation, recommended) or "sample-median"
imputation_method: pimms_collabfilter   # Imputation: "pimms_collabfilter" or "hist_grad_boost"
df_to_use: df_norm              # Which dataset to analyse:
                                #   "df" (raw, not recommended)
                                #   "df_log2" (log2 transformed)
                                #   "df_norm" (normalised)
                                #   "df_imp" (normalised + imputed)

# ---- SPECIES & ANNOTATION ----
species: hsapiens              # Species for pathway enrichment: e.g. hsapiens, mmusculus, etc.

# ---- FILE PATHS ----
protPath: input/data/proteindata.csv    # Path to protein data file
metaPath: input/data/metadata.csv       # Path to metadata file
outPath: output                         # Directory for all outputs
json_outPath: output/data/data_for_report.json  # JSON file for storing report-related info

# ---- SUBSETTING OPTIONS ----
analyse_full_dataset: true     # Analyse full dataset without filtering (true/false)
analyse_subsets: false         # Analyse subsets based on a metadata variable (true/false)
subset_variable: ""            # Metadata column to subset on (e.g. "timepoint")
subsets: []                    # Specific subset values to run (empty = all values of subset_variable)

# ---- DIFFERENTIAL EXPRESSION (DE) ----
DE_full_formula: "~ treatment" # Formula for DE on full dataset (R-style model formula)
DE_subset_formula: "~ treatment" # Formula for DE on subsets

# ---- VISUALISATION CUT-OFFS ----
LFC_plot_p_or_FDRp: Log10_FDR_P_Value # Which p-value metric to use on volcano plot: "Log10_P_Value" or "Log10_FDR_P_Value"
LFC_threshold: 1               # Log2 fold-change threshold for highlighting points in volcano plot
FDR_threshold: 0.05            # FDR cut-off for colouring points

# ---- PATHWAY ENRICHMENT ----
enrichment_pathways: KEGG      # Pathway database: KEGG, Reactome, etc.
